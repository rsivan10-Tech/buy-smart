[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "npm ci && npm run build"
  
[build.environment]
  NODE_ENV = "production"
  NEXT_PUBLIC_BACKEND_URL = "http://127.0.0.1:8005"

[context.production.environment]
  NEXT_PUBLIC_BACKEND_URL = "https://your-backend-host.example.com"  # set after backend deploy
