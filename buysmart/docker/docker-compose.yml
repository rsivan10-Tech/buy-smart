version: '3.9'
services:
  postgres:
    image: postgis/postgis:3.4-3.3
    container_name: buysmart_postgres
    restart: always
    environment:
      POSTGRES_USER: buysmart_user
      POSTGRES_PASSWORD: buysmart_pass
      POSTGRES_DB: buysmart_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  frontend:
    image: node:20-alpine
    container_name: buysmart_frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - '3000:3000'
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    container_name: buysmart_backend
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - '8000:8000'
    depends_on:
      - postgres

volumes:
  postgres_data:
